# Example nginx routing for the hybrid ASPX migration pattern.
#
# GET /Page.aspx
#   -> static HTML shell
#
# POST /Page.aspx
#   -> ASP.NET Core backend for postback-style actions

location = /Page.aspx {
    if ($request_method = GET) {
        rewrite ^ /service-name/Page.html last;
    }

    proxy_pass http://service-name_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /service-name/ {
    root /usr/share/nginx/html;
    index Page.html;
}
